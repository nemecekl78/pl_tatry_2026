<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Tatry 2026</title>
<meta name="description" content="Plánovací a rozhodovací nástroj pro pobyt 25. 7. – 1. 8. 2026, Białka Tatrzańská.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tatry 2026">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
/* =====================================================================
   Liquid Glass — materiálová vrstva
   Průsvitnost, lom světla, plovoucí prvky, koncentrické rádiusy.
   Respektuje prefers-reduced-transparency i ruční „sluneční režim".
   ===================================================================== */
:root{
  --ink:#f2f7ff; --ink-2:#b9cbe4; --ink-3:#8598b5;
  --acc:#5cc8ff; --green:#3ddc8c; --amber:#ffc94d; --red:#ff6b61; --relax:#b79cff;
  --active:#5cc8ff;

  /* sklo: vrstvy materiálu, ne barvy */
  --g-1:rgba(255,255,255,.07);   /* podložka */
  --g-2:rgba(255,255,255,.12);   /* karta */
  --g-3:rgba(255,255,255,.19);   /* zvednutý prvek */
  --g-hi:rgba(255,255,255,.30);  /* horní světlo */
  --g-line:rgba(255,255,255,.20);
  --g-line-2:rgba(255,255,255,.32);
  --blur:20px; --blur-lg:34px;

  /* koncentrické rádiusy */
  --r-xl:30px; --r-lg:24px; --r-md:18px; --r-sm:13px;
  --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
}
/* Sluneční / vysoký kontrast — sklo ztuhne, průsvitnost zmizí */
html[data-solid="1"]{
  --g-1:#16233a; --g-2:#1d2d49; --g-3:#26395a; --g-hi:transparent;
  --g-line:rgba(255,255,255,.28); --g-line-2:rgba(255,255,255,.42);
  --blur:0px; --blur-lg:0px; --ink-2:#cfdcee; --ink-3:#a4b6cf;
}
@media (prefers-reduced-transparency:reduce){
  :root{ --g-1:#16233a; --g-2:#1d2d49; --g-3:#26395a; --g-hi:transparent; --blur:0px; --blur-lg:0px; }
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overscroll-behavior-y:none}
body{
  background:#0a1220; color:var(--ink);
  font:15px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  display:flex; flex-direction:column; height:100dvh; position:relative;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

/* --------- Pozadí, přes které sklo láme světlo --------- */
.backdrop{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.backdrop .sky{position:absolute;inset:0;background:linear-gradient(#0d2036 0%,#143350 42%,#1d4d63 72%,#276b73 100%)}
.backdrop .sun{position:absolute;top:12%;right:16%;width:132px;height:132px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,214,140,.55) 0%,rgba(255,180,90,.12) 55%,transparent 72%)}
.backdrop .ridge{position:absolute;left:-6%;right:-6%;bottom:0}
.backdrop .r1{height:46%;bottom:16%;background:#1c3f5c;
  clip-path:polygon(0 100%,0 62%,13% 34%,24% 55%,38% 18%,52% 48%,63% 26%,78% 57%,89% 38%,100% 61%,100% 100%)}
.backdrop .r2{height:38%;bottom:6%;background:#173650;
  clip-path:polygon(0 100%,0 70%,11% 47%,26% 68%,41% 36%,55% 62%,70% 40%,85% 66%,100% 49%,100% 100%)}
.backdrop .r3{height:24%;bottom:0;background:#0f2438;
  clip-path:polygon(0 100%,0 62%,18% 40%,34% 66%,50% 44%,68% 70%,84% 50%,100% 68%,100% 100%)}
html[data-solid="1"] .backdrop .sun{display:none}
html[data-solid="1"] .backdrop .sky{background:#0d1c2e}

/* --------- Plovoucí hlavička --------- */
header{
  position:relative; z-index:20; flex:none; margin:0 10px;
  padding:calc(var(--safe-t) + 9px) 14px 11px;
  display:flex; align-items:center; gap:10px;
  background:var(--g-2); border:.5px solid var(--g-line);
  border-top:none; border-radius:0 0 var(--r-lg) var(--r-lg);
  -webkit-backdrop-filter:blur(var(--blur-lg)) saturate(180%);
  backdrop-filter:blur(var(--blur-lg)) saturate(180%);
}
header::before{content:"";position:absolute;left:14px;right:14px;bottom:0;height:.5px;
  background:linear-gradient(90deg,transparent,var(--g-hi),transparent)}
header h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.2px}
header .sub{font-size:11px;color:var(--ink-2);font-weight:400;display:block;margin-top:1px}
.hbtns{margin-left:auto;display:flex;gap:6px;align-items:center}
.chipbtn{
  background:var(--g-3); border:.5px solid var(--g-line-2); border-radius:var(--r-sm);
  padding:7px 11px; font-size:12px; font-weight:500;
  -webkit-backdrop-filter:blur(var(--blur)); backdrop-filter:blur(var(--blur));
  transition:transform .18s cubic-bezier(.2,.9,.3,1.3), background .18s;
}
.chipbtn:active{transform:scale(.93)}
.chipbtn.on{background:var(--acc);color:#04202f;border-color:transparent}

/* --------- Obsah --------- */
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:10}
.view{display:none;padding:12px 12px 108px}
.view.on{display:block}
#view-map.on{display:block;padding:0;height:100%}

/* --------- Skleněné karty --------- */
.card{
  position:relative; background:var(--g-2); border:.5px solid var(--g-line);
  border-radius:var(--r-xl); padding:15px; margin-bottom:11px; overflow:hidden;
  -webkit-backdrop-filter:blur(var(--blur)) saturate(170%);
  backdrop-filter:blur(var(--blur)) saturate(170%);
}
.card::before{content:"";position:absolute;top:0;left:16px;right:16px;height:.5px;
  background:linear-gradient(90deg,transparent,var(--g-hi),transparent)}
.card h2{margin:0 0 3px;font-size:18px;font-weight:600;letter-spacing:-.2px}
.card h3{margin:15px 0 8px;font-size:12px;color:var(--ink-2);letter-spacing:.7px;font-weight:600;text-transform:uppercase}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.muted{color:var(--ink-2);font-size:13px}
.small{font-size:12px}

.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.4px;
  background:var(--g-3);border:.5px solid var(--g-line)}
.b-active{color:var(--active)} .b-relax{color:var(--relax)}
.b-T1{color:var(--green)} .b-T2{color:var(--amber)} .b-T3{color:#ff9d5c} .b-T4{color:var(--red)}

/* --------- Verdikt: zvednutá vrstva skla --------- */
.verdict{
  position:relative; border-radius:var(--r-lg); padding:14px 15px; margin:12px 0 4px;
  background:var(--g-3); border:.5px solid var(--g-line-2); overflow:hidden;
  -webkit-backdrop-filter:blur(var(--blur)); backdrop-filter:blur(var(--blur));
}
.verdict::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px}
.v-go::after{background:var(--green)} .v-warn::after{background:var(--amber)}
.v-no::after{background:var(--red)}   .v-none::after{background:var(--relax)}
.v-title{font-size:19px;font-weight:600;margin:0 0 4px;display:flex;align-items:center;gap:9px;letter-spacing:-.2px}
.dot{width:11px;height:11px;border-radius:50%;flex:none}
.d-go{background:var(--green)} .d-warn{background:var(--amber)} .d-no{background:var(--red)} .d-none{background:var(--relax)}
.reasons{margin:8px 0 0;padding-left:18px;font-size:13px;color:var(--ink-2)}
.reasons li{margin:3px 0}

/* --------- Metriky --------- */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(76px,1fr));gap:7px;margin-top:11px}
.metric{background:var(--g-1);border:.5px solid var(--g-line);border-radius:var(--r-md);padding:9px 7px;text-align:center;position:relative;overflow:hidden}
.metric::after{content:"";position:absolute;left:20%;right:20%;top:0;height:2px;border-radius:2px;background:var(--g-line)}
.metric.g::after{background:var(--green)} .metric.a::after{background:var(--amber)} .metric.r::after{background:var(--red)}
.metric .k{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px}
.metric .v{font-size:17px;font-weight:600;margin-top:3px}

/* --------- Hodinový pruh --------- */
.hours{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.hours::-webkit-scrollbar{display:none}
.hr{flex:none;width:56px;background:var(--g-1);border:.5px solid var(--g-line);border-radius:var(--r-md);padding:8px 4px;text-align:center;font-size:11px}
.hr.win{background:var(--g-3);border-color:var(--g-line-2)}
.hr .h{color:var(--ink-3)}
.hr .t{font-size:15px;font-weight:600;margin:3px 0}
.hr .p{color:var(--acc);font-size:10px}
.hr .bar{height:3px;border-radius:2px;margin-top:5px;background:var(--g-line)}

/* --------- Řádky seznamu --------- */
.item{display:flex;gap:11px;padding:11px;background:var(--g-1);border:.5px solid var(--g-line);
  border-radius:var(--r-md);margin-bottom:7px;align-items:flex-start}
.item .ic{width:32px;height:32px;border-radius:11px;display:grid;place-items:center;font-size:15px;flex:none;
  background:var(--g-3);border:.5px solid var(--g-line)}
.item .body{flex:1;min-width:0}
.item .nm{font-weight:600;font-size:14px;letter-spacing:-.1px}
.item .mt{font-size:12px;color:var(--ink-2);margin-top:3px;line-height:1.5}
.item .go{flex:none;align-self:center;font-size:12px;color:var(--acc);background:var(--g-3);
  border:.5px solid var(--g-line);border-radius:11px;padding:7px 10px;text-decoration:none}

/* --------- Filtry --------- */
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:9px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.f{flex:none;padding:8px 13px;border-radius:999px;background:var(--g-2);border:.5px solid var(--g-line);font-size:12.5px;
  -webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));
  transition:transform .18s cubic-bezier(.2,.9,.3,1.3)}
.f:active{transform:scale(.94)}
.f.on{background:var(--acc);color:#04202f;border-color:transparent;font-weight:600}

/* --------- Mapa --------- */
#map{position:absolute;inset:0}
.mapwrap{position:relative;height:100%}
.layers{position:absolute;top:12px;left:10px;right:10px;display:flex;gap:6px;overflow-x:auto;z-index:5;scrollbar-width:none}
.layers::-webkit-scrollbar{display:none}
.lchip{flex:none;padding:8px 12px;border-radius:999px;background:var(--g-2);border:.5px solid var(--g-line);font-size:12px;
  -webkit-backdrop-filter:blur(var(--blur-lg)) saturate(180%);backdrop-filter:blur(var(--blur-lg)) saturate(180%)}
.lchip.on{background:var(--acc);color:#04202f;border-color:transparent;font-weight:600}
.stylebar{position:absolute;bottom:104px;left:10px;z-index:5;display:flex;gap:6px}
.maplibregl-popup-content{background:var(--g-2);color:var(--ink);border-radius:var(--r-lg);padding:13px 15px;
  font-family:inherit;border:.5px solid var(--g-line-2);
  -webkit-backdrop-filter:blur(var(--blur-lg)) saturate(180%);backdrop-filter:blur(var(--blur-lg)) saturate(180%)}
.maplibregl-popup-close-button{color:var(--ink-2);font-size:19px;padding-right:7px}
.maplibregl-popup-tip{display:none}
.maplibregl-ctrl-bottom-right{bottom:96px}
.maplibregl-ctrl-bottom-left{bottom:82px}
.maplibregl-ctrl-group{background:var(--g-2)!important;border:.5px solid var(--g-line)!important;border-radius:var(--r-md)!important;
  -webkit-backdrop-filter:blur(var(--blur-lg));backdrop-filter:blur(var(--blur-lg))}
.maplibregl-ctrl-group button+button{border-top:.5px solid var(--g-line)!important}
.maplibregl-ctrl-group button .maplibregl-ctrl-icon{filter:invert(1) brightness(1.4)}
.maplibregl-ctrl-attrib{background:var(--g-1)!important;border-radius:11px;font-size:10px}
.maplibregl-ctrl-attrib a{color:var(--ink-3)!important}
.mk{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:13px;
  border:1.5px solid rgba(255,255,255,.55);cursor:pointer}

/* --------- Plovoucí navigace (pill) --------- */
nav{
  position:fixed; z-index:30; left:12px; right:12px;
  bottom:calc(var(--safe-b) + 12px);
  display:grid; grid-template-columns:repeat(5,1fr);
  background:var(--g-2); border:.5px solid var(--g-line-2); border-radius:26px;
  padding:7px 6px; overflow:hidden;
  -webkit-backdrop-filter:blur(var(--blur-lg)) saturate(180%);
  backdrop-filter:blur(var(--blur-lg)) saturate(180%);
}
nav::before{content:"";position:absolute;top:0;left:20%;right:20%;height:.5px;
  background:linear-gradient(90deg,transparent,var(--g-hi),transparent)}
nav button{padding:7px 0 6px;font-size:10px;color:var(--ink-3);display:flex;flex-direction:column;align-items:center;gap:4px;
  border-radius:19px;transition:transform .2s cubic-bezier(.2,.9,.3,1.3),background .2s,color .2s}
nav button .i{font-size:19px;line-height:1}
nav button:active{transform:scale(.9)}
nav button.on{color:var(--ink);background:var(--g-3)}

/* --------- Ostatní --------- */
.banner{background:var(--g-2);border:.5px solid var(--g-line);color:var(--ink-2);border-radius:var(--r-md);
  padding:11px 13px;font-size:12.5px;margin-bottom:11px;
  -webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur))}
.daytabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:11px;scrollbar-width:none}
.daytabs::-webkit-scrollbar{display:none}
.dt{flex:none;min-width:58px;padding:9px;border-radius:var(--r-md);background:var(--g-2);border:.5px solid var(--g-line);text-align:center;
  -webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur))}
.dt.on{background:var(--acc);color:#04202f;border-color:transparent}
.dt .dnum{font-size:16px;font-weight:600}
.dt .ddate{font-size:10px;opacity:.85}
.spinner{text-align:center;color:var(--ink-2);padding:20px;font-size:13px}
table.leg{width:100%;border-collapse:collapse;font-size:12px}
table.leg td,table.leg th{padding:7px 5px;border-bottom:.5px solid var(--g-line);text-align:left;vertical-align:top}
table.leg th{color:var(--ink-3);font-weight:600}
.sw{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--g-line)}
.toggle{width:48px;height:29px;border-radius:999px;background:var(--g-3);border:.5px solid var(--g-line);position:relative;transition:.22s;flex:none}
.toggle.on{background:var(--acc);border-color:transparent}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;
  transition:transform .22s cubic-bezier(.2,.9,.3,1.3)}
.toggle.on::after{transform:translateX(19px)}
</style>
</head>
<body>

<div class="backdrop" aria-hidden="true">
  <div class="sky"></div>
  <div class="sun"></div>
  <div class="ridge r1"></div>
  <div class="ridge r2"></div>
  <div class="ridge r3"></div>
</div>

<header>
  <div>
    <h1 id="hTitle">Tatry 2026</h1>
    <span class="sub" id="hSub">Białka Tatrzańska · 25. 7. – 1. 8. 2026</span>
  </div>
  <div class="hbtns">
    <button class="chipbtn" id="langBtn">CZ</button>
    <button class="chipbtn" id="refreshBtn">⟳</button>
  </div>
</header>

<main>
  <section class="view on" id="view-today"></section>
  <section class="view" id="view-days"></section>
  <section class="view" id="view-map">
    <div class="mapwrap">
      <div id="map"></div>
      <div class="layers" id="layerChips"></div>
      <div class="stylebar">
        <button class="lchip on" data-style="liberty">Vektor</button>
        <button class="lchip" data-style="topo">Topo</button>
        <button class="lchip" data-style="osm">OSM</button>
      </div>
    </div>
  </section>
  <section class="view" id="view-trails"></section>
  <section class="view" id="view-relax"></section>
</main>

<nav>
  <button class="on" data-v="today"><span class="i">☀️</span><span data-i18n="nav_today">Dnes</span></button>
  <button data-v="days"><span class="i">🗓</span><span data-i18n="nav_days">Dny</span></button>
  <button data-v="map"><span class="i">🗺</span><span data-i18n="nav_map">Mapa</span></button>
  <button data-v="trails"><span class="i">🥾</span><span data-i18n="nav_trails">Trasy</span></button>
  <button data-v="relax"><span class="i">💧</span><span data-i18n="nav_relax">Relax</span></button>
</nav>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="data.js"></script>
<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
